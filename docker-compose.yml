version: '3.8'

services:
  financeai:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: financeai-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - financeai-network

networks:
  financeai-network:
    driver: bridge
